<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Completed</title>
    <style>
        /* Fonts based on Brand Guidelines */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

        :root {
            /* Light Theme Colors */
            --bg-page: #f9fafb;       /* bg-secondary */
            --bg-card: #ffffff;       /* bg-primary */
            --text-main: #111827;     /* text-primary */
            --text-sub: #374151;      /* text-secondary */
            --brand-purple: #8b5cf6;  /* accent-primary */
            --brand-hover: #7c3aed;   /* accent-primary-hover */
            --brand-success: #10b981; /* success */
            --shadow-card: 0 4px 12px rgba(0,0,0,0.08); /* shadow-md */
        }

        /* Dark Theme Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #0f172a;    /* bg-primary */
                --bg-card: #1f2937;    /* bg-secondary */
                --text-main: #f1f5f9;  /* text-primary */
                --text-sub: #cbd5e1;   /* text-secondary */
                --brand-hover: #9f7aea; /* Dark mode hover */
                --shadow-card: 0 4px 16px rgba(0,0,0,0.25);
            }
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .card {
            background: var(--bg-card);
            padding: 40px 32px; /* */
            border-radius: 12px; /* radius-lg */
            box-shadow: var(--shadow-card);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: all 0.2s ease;
        }

        .icon {
            color: var(--brand-success); /* Emerald Green */
            font-size: 64px;
            margin-bottom: 24px;
            line-height: 1;
        }

        h1 { 
            margin: 0 0 12px 0; 
            font-size: 24px; /* text-h2 */
            font-weight: 700;
            color: var(--text-main);
        }

        p { 
            color: var(--text-sub); 
            margin-bottom: 32px; /* space-8 */
            font-size: 15px; /* text-base */
            line-height: 1.6; /* line-height-relaxed */
        }

        /* Primary Button Styles */
        .btn {
            background-color: var(--brand-purple);
            color: #ffffff;
            padding: 10px 20px;
            border: none;
            border-radius: 8px; /* radius-md */
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .btn:hover { 
            background-color: var(--brand-hover); 
            transform: scale(1.02); /* */
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        
        .note {
            font-size: 12px; /* text-caption */
            color: var(--text-sub);
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✓</div>
        <h1>Registration Completed</h1>
        <p>Your registration has been successfully completed.<br>You may now close this window.</p>
        
        <button class="btn" onclick="window.close()">Close Window</button>
    </div>

</body>
</html>
