<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Completed | AI ChatWorks</title>
    <style>
        /* Fonts: Open Sans as per Brand Guidelines */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');

        :root {
            /* Light Theme Colors */
            --bg-page: #f9fafb;       /* bg-secondary */
            --bg-card: #ffffff;       /* bg-primary */
            --text-main: #111827;     /* text-primary */
            --text-sub: #374151;      /* text-secondary */
            --text-muted: #6b7280;    /* text-tertiary */
            --brand-purple: #8b5cf6;  /* accent-primary */
            --brand-success: #10b981; /* success */
            --border-color: #e5e7eb;
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.1); /* shadow-lg */
        }

        /* Dark Theme Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #0f172a;    /* bg-primary */
                --bg-card: #1f2937;    /* bg-secondary */
                --text-main: #f1f5f9;  /* text-primary */
                --text-sub: #cbd5e1;   /* text-secondary */
                --text-muted: #9ca3af; /* text-tertiary */
                --border-color: #313e53;
                --shadow-lg: 0 20px 80px rgba(0, 0, 0, 0.6);
            }
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .card {
            background: var(--bg-card);
            padding: 48px 40px;
            border-radius: 12px; /* radius-lg */
            border: 1px solid var(--border-color);
            /* Brand Accent Top Border */
            border-top: 4px solid var(--brand-purple); 
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
        }

        /* Logo Representation */
        .brand-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand-logo span {
            color: var(--brand-purple);
        }

        /* Success Icon Container */
        .icon-container {
            width: 64px;
            height: 64px;
            background-color: rgba(16, 185, 129, 0.1); /* Emerald transparent */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon {
            color: var(--brand-success); /* Emerald Green */
            font-size: 32px;
        }

        h1 { 
            margin: 0 0 12px 0; 
            font-size: 24px; /* text-h2 */
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        p { 
            color: var(--text-sub); 
            margin: 0 auto;
            font-size: 16px;
            line-height: 1.6; 
            max-width: 320px;
        }
        
        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 32px 0;
            width: 100%;
        }

        .instruction-text {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-logo">
        </div>

        <div class="icon-container">
            <div class="icon">✓</div>
        </div>

        <h1>Registration Completed</h1>
        <p>Thank you! Your details have been successfully received.</p>
        
        <div class="divider"></div>
        
        <div class="instruction-text">
            You may now close this window.
        </div>
    </div>

</body>
</html>
